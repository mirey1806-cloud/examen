<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 30px;
}

h2 {
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 30px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background: #667eea;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
  text-align: center;
}

tr:nth-child(even) {
  background: #f2f2f2;
}

.logout {
  display: block;
  text-align: center;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <h2>Panel Administrador</h2>

  <!-- ✅ ACCESO CORRECTO -->
  <h3>✔ Accesos Correctos</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="successLogs"></tbody>
  </table>

  <!-- ❌ ACCESO FALLIDO -->
  <h3>❌ Accesos Fallidos</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="failLogs"></tbody>
  </table>

  <!-- 🔓 LOGOUT -->
  <h3>🔓 Cierre de Sesión</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="logoutLogs"></tbody>
  </table>

  <br>
  <a href="/logout">Cerrar sesión</a>
  </div>

  <script>
    async function cargarLogs(url, tableId) {
      const res = await fetch(url);
      const logs = await res.json();

      const table = document.getElementById(tableId);
      table.innerHTML = "";

      logs.forEach(log => {
        table.innerHTML += `
          <tr>
            <td>${log.username}</td>
            <td>${new Date(log.date).toLocaleString()}</td>
          </tr>
        `;
      });
    }

    // Cargar las 3 bitácoras
    cargarLogs("/logs/success", "successLogs");
    cargarLogs("/logs/fail", "failLogs");
    cargarLogs("/logs/logout", "logoutLogs");
  </script>
</body>
</html>
