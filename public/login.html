<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>
  <h2>Iniciar Sesión</h2>

  <form id="formLogin">
    <input type="text" id="username" placeholder="Usuario" required><br><br>
    <input type="password" id="password" placeholder="Contraseña" required><br><br>

    <button type="submit">Entrar</button>
  </form>

  <script>
    document.getElementById("formLogin").addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
      };

      const res = await fetch("/login", {  // 👈 CORREGIDO
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const dataRes = await res.json();

if (dataRes.message === "Login correcto") {
  if (dataRes.role === "admin") {
    window.location.href = "admin.html";
  } else {
    window.location.href = "user.html";
  }
} else {
  alert(dataRes.message);
}
    });
  </script>
</body>
</html>
